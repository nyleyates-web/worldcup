const QUESTIONS = [
  { key: "winner",   label: "Winner",           isCountry: true },
  { key: "runnerup", label: "Runner-up",         isCountry: true },
  { key: "boot",     label: "Golden boot",       isCountry: false },
  { key: "glove",    label: "Golden glove",      isCountry: false },
  { key: "ball",     label: "Golden ball",       isCountry: false },
  { key: "young",    label: "Young player",      isCountry: false },
  { key: "goals",    label: "Total goals",       isCountry: null },
  { key: "shock",    label: "Shock early exit",  isCountry: true },
  { key: "dark",     label: "Dark horse",        isCountry: true },
  { key: "score",    label: "Correct final score", isCountry: null },
];

const SUMMARY_QUESTIONS = QUESTIONS.filter(q => q.isCountry !== null && q.key !== "goals" && q.key !== "score");

/* ============================================================
   ACTUAL TOURNAMENT RESULTS
   Note: "Shock early exit" and "Dark horse" have no single
   official right answer (they're subjective calls), so they're
   shown on the Results tab but excluded from the scored total.
   ============================================================ */
const ACTUAL_RESULTS = {
  winner:   "Spain",
  runnerup: "Argentina",
  boot:     "Kylian Mbappé",   // 10 goals — outright Golden Boot
  glove:    "Unai Simón",
  ball:     "Rodri",           // Golden Ball — beat out Messi
  young:    "Pau Cubarsí",     // Best Young Player — beat Lamine Yamal
  goals:    308,               // total tournament goals (excl. shootouts)
  score:    "1-0",             // Spain 1–0 Argentina (a.e.t.)
  shock:    "Germany",         // agreed office answer for Shock Early Exit
  dark:     "Norway",          // agreed office answer for Dark Horse
};
const GOALS_TOLERANCE = 10; // "within 10 either side" counts as correct

// Categories that get scored — Shock Exit and Dark Horse are subjective by
// nature, but the office already agreed on Germany/Norway as the accepted
// answers, so they're scored the same as every other category.
const SCORED_KEYS = ["winner", "runnerup", "boot", "glove", "ball", "young", "goals", "shock", "dark", "score"];

function isCorrect(person, key) {
  if (key === "goals") {
    const n = parseInt(person.goals);
    if (isNaN(n)) return false;
    return Math.abs(n - ACTUAL_RESULTS.goals) <= GOALS_TOLERANCE;
  }
  return norm(person[key]) === norm(ACTUAL_RESULTS[key]);
}

function scorePerson(person) {
  const hits = {};
  let total = 0;
  SCORED_KEYS.forEach(key => {
    const correct = isCorrect(person, key);
    hits[key] = correct;
    if (correct) total++;
  });
  return { total, hits };
}

const LEADERBOARD = people
  .map(p => ({ person: p, ...scorePerson(p) }))
  .sort((a, b) => b.total - a.total);

function tally(key, isCountry) {
  const counts = {};
  people.forEach(p => {
    const val = p[key].trim().toLowerCase().replace(/\s+/g, ' ');
    counts[val] = (counts[val] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  return sorted.map(([val, count]) => {
    const original = people.find(p => p[key].trim().toLowerCase().replace(/\s+/g,' ') === val)[key].trim();
    return { val: original, count, pct: Math.round(count / people.length * 100) };
  });
}

function buildSummaryPanel() {
  const div = document.createElement('div');
  div.className = 'panel';
  div.id = 'panel-summary';

  const grid = document.createElement('div');
  grid.className = 'summary-grid';

  SUMMARY_QUESTIONS.forEach(q => {
    const results = tally(q.key, q.isCountry);
    const top = results[0];
    const rest = results.slice(1, 4);

    const topFlag = getFlag(top.val, q.isCountry);
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.innerHTML = `
      <div class="s-label">${q.label}</div>
      <div class="s-winner">
        ${topFlag ? `<img src="${flag(topFlag)}" alt="">` : ''}
        <div>
          <div class="s-winner-name">${top.val}</div>
          <div class="s-pct">${top.count} vote${top.count>1?'s':''} &middot; ${top.pct}%</div>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${top.pct}%"></div></div>
      ${rest.length ? `<div class="s-others">${rest.map(r => {
        const rf = getFlag(r.val, q.isCountry);
        return `<div class="s-other">${rf ? `<img src="${flag(rf)}" alt="">` : ''}<span>${r.val} &middot; ${r.count}</span></div>`;
      }).join('')}</div>` : ''}
    `;
    grid.appendChild(card);
  });

  div.appendChild(grid);
  return div;
}

function buildPersonPanel(person, idx) {
  const div = document.createElement('div');
  div.className = 'panel';
  div.id = `panel-${idx}`;

  const grid = document.createElement('div');
  grid.className = 'pred-grid';

  QUESTIONS.forEach(q => {
    const card = document.createElement('div');
    const val = person[q.key];
    const isPlain = q.isCountry === null;
    card.className = 'pred-card' + (isPlain ? ' plain' : '');
    const flagCode = isPlain ? null : getFlag(val, q.isCountry);
    card.innerHTML = `
      <div class="p-label">${q.label}</div>
      <div class="p-value">
        ${flagCode ? `<img src="${flag(flagCode)}" alt="">` : ''}
        <span>${val}</span>
      </div>
    `;
    grid.appendChild(card);
  });

  div.appendChild(grid);
  return div;
}

function buildGoalsScale() {
  const vals = people.map(p => parseInt(p.goals)).filter(n => !isNaN(n));
  const avg = Math.round(vals.reduce((a,b) => a+b, 0) / vals.length);
  const min = Math.min(...vals);
  const max = Math.max(...vals);

  const wrap = document.createElement('div');
  wrap.className = 'goals-scale-wrap';
  wrap.innerHTML = `<div class="goals-scale-label">Total goals — all predictions</div>
    <div class="goals-track" id="goals-track">
      <div class="goals-track-fill" style="width:100%"></div>
    </div>
    <div class="goals-axis">
      <span>0</span><span>100</span><span>200</span><span>300</span><span>400</span>
    </div>
    <div class="goals-avg">Average prediction: <span>${avg} goals</span> &nbsp;·&nbsp; Range: <span>${min}–${max}</span></div>`;

  setTimeout(() => {
    const track = document.getElementById('goals-track');
    if (!track) return;
    const trackW = track.offsetWidth;
    people.forEach(p => {
      const n = parseInt(p.goals);
      if (isNaN(n)) return;
      const dot = document.createElement('div');
      dot.className = 'goals-dot';
      dot.style.left = (n / 400 * 100) + '%';
      const tip = document.createElement('div');
      tip.className = 'goals-tooltip';
      tip.textContent = p.name.split(' ')[0] + ': ' + n;
      dot.appendChild(tip);
      track.appendChild(dot);
    });
    const avgDot = document.createElement('div');
    avgDot.className = 'goals-dot';
    avgDot.style.left = (avg / 400 * 100) + '%';
    avgDot.style.background = '#f59e0b';
    avgDot.style.width = '10px';
    avgDot.style.height = '10px';
    const avgTip = document.createElement('div');
    avgTip.className = 'goals-tooltip';
    avgTip.textContent = 'Avg: ' + avg;
    avgDot.appendChild(avgTip);
    track.appendChild(avgDot);
  }, 50);

  return wrap;
}

/* ============================================================
   RESULTS PANEL — actual outcomes + scored leaderboard
   ============================================================ */
function buildResultsPanel() {
  const div = document.createElement('div');
  div.className = 'panel';
  div.id = 'panel-results';

  const intro = document.createElement('div');
  intro.className = 'results-intro';
  intro.textContent = "It's all over! Here's how the tournament actually finished, and how everyone's predictions stack up. 1 point per correct answer — Winner, Runner-up, Golden Boot, Golden Glove, Golden Ball, Young Player, Shock Early Exit, Dark Horse and Correct Score all need an exact match (Shock/Dark Horse are scored against the office's agreed answers of Germany/Norway); Total Goals counts as correct within " + GOALS_TOLERANCE + " goals either side of the real total (" + ACTUAL_RESULTS.goals + ").";
  div.appendChild(intro);

  // --- Actual results cards ---
  const resultsTitle = document.createElement('div');
  resultsTitle.className = 'results-section-title';
  resultsTitle.textContent = 'Actual Results';
  div.appendChild(resultsTitle);

  const actualGrid = document.createElement('div');
  actualGrid.className = 'actual-grid';

  const ACTUAL_DISPLAY = [
    { key: 'winner',   label: 'Winner',            isCountry: true,  note: null },
    { key: 'runnerup', label: 'Runner-up',         isCountry: true,  note: 'Lost 1–0 (a.e.t.)' },
    { key: 'boot',     label: 'Golden boot',       isCountry: false, note: '10 goals' },
    { key: 'glove',    label: 'Golden glove',      isCountry: false, note: 'Conceded once all tournament' },
    { key: 'ball',     label: 'Golden ball',       isCountry: false, note: 'Beat Messi to it' },
    { key: 'young',    label: 'Young player',      isCountry: false, note: 'Beat Lamine Yamal to it' },
    { key: 'goals',    label: 'Total goals',       isCountry: null,  note: `${ACTUAL_RESULTS.goals - GOALS_TOLERANCE}–${ACTUAL_RESULTS.goals + GOALS_TOLERANCE} counted as correct` },
    { key: 'shock',    label: 'Shock early exit',  isCountry: true,  note: 'Office-agreed answer' },
    { key: 'dark',     label: 'Dark horse',        isCountry: true,  note: 'Office-agreed answer' },
    { key: 'score',    label: 'Correct final score', isCountry: null, note: 'Spain 1–0 Argentina' },
  ];

  ACTUAL_DISPLAY.forEach(q => {
    const val = String(ACTUAL_RESULTS[q.key]);
    const flagCode = q.isCountry === null ? null : getFlag(val, q.isCountry);

    // Who got this one right?
    const correctNames = LEADERBOARD
      .filter(entry => entry.hits[q.key])
      .map(entry => entry.person.name);

    const tooltip = correctNames.length
      ? `<div class="tt-title">Correctly predicted by</div>${correctNames.map(n => `<div class="tt-name">${n}</div>`).join('')}`
      : `<div class="tt-title">Correctly predicted by</div><div class="tt-none">No one 😬</div>`;

    const card = document.createElement('div');
    card.className = 'actual-card';
    card.innerHTML = `
      <div class="a-label">${q.label}</div>
      <div class="a-value">
        ${flagCode ? `<img src="${flag(flagCode)}" alt="">` : ''}
        <span>${val}</span>
      </div>
      ${q.note ? `<div class="a-note">${q.note}</div>` : ''}
      <div class="a-hint">${correctNames.length} correct — hover to see who</div>
      <div class="a-tooltip">${tooltip}</div>
    `;
    actualGrid.appendChild(card);
  });

  div.appendChild(actualGrid);

  // --- Leaderboard ---
  const lbTitle = document.createElement('div');
  lbTitle.className = 'results-section-title';
  lbTitle.textContent = 'Leaderboard';
  div.appendChild(lbTitle);

  const wrap = document.createElement('div');
  wrap.className = 'leaderboard-wrap';
  const scrollWrap = document.createElement('div');
  scrollWrap.className = 'leaderboard-scroll';

  const table = document.createElement('table');
  table.className = 'leaderboard';

  const colLabels = {
    winner: 'Winner', runnerup: 'Runner-up', boot: 'Boot', glove: 'Glove',
    ball: 'Ball', young: 'Young', goals: 'Goals', shock: 'Shock', dark: 'Dark',
    score: 'Score',
  };

  const thead = document.createElement('thead');
  thead.innerHTML = `<tr>
    <th>#</th>
    <th>Name</th>
    <th>Pts</th>
    ${SCORED_KEYS.map(k => `<th>${colLabels[k]}</th>`).join('')}
  </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  let rank = 0;
  let prevScore = null;
  LEADERBOARD.forEach((entry, i) => {
    if (entry.total !== prevScore) rank = i + 1;
    prevScore = entry.total;
    const tr = document.createElement('tr');
    if (rank === 1) tr.className = 'winner-row';
    tr.innerHTML = `
      <td class="lb-rank${rank === 1 ? ' gold' : ''}">${rank === 1 ? '🏆' : rank}</td>
      <td class="lb-name">${entry.person.name}</td>
      <td class="lb-score">${entry.total}</td>
      ${SCORED_KEYS.map(k => `<td class="lb-cell ${entry.hits[k] ? 'hit' : 'miss'}">${entry.hits[k] ? '✓' : '·'}</td>`).join('')}
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  scrollWrap.appendChild(table);
  wrap.appendChild(scrollWrap);
  div.appendChild(wrap);

  const legend = document.createElement('div');
  legend.className = 'results-legend';
  const topScore = LEADERBOARD[0].total;
  const winners = LEADERBOARD.filter(e => e.total === topScore).map(e => e.person.name);
  legend.textContent = winners.length > 1
    ? `🏆 Tied for the win with ${topScore} points: ${winners.join(', ')}`
    : `🏆 Winner: ${winners[0]} with ${topScore} points`;
  div.appendChild(legend);

  return div;
}

const summaryTabsEl = document.getElementById('tabs-summary');
const peopleTabsEl = document.getElementById('tabs-people');
const panelsEl = document.getElementById('panels');

function setActive(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

// Work out which first names are duplicated
const firstNameCounts = {};
people.forEach(p => {
  const fn = p.name.split(' ')[0];
  firstNameCounts[fn] = (firstNameCounts[fn] || 0) + 1;
});

function tabLabel(name) {
  const parts = name.split(' ');
  const first = parts[0];
  if (firstNameCounts[first] > 1) {
    return first + ' ' + parts[parts.length - 1][0];
  }
  return first;
}

// Results tab (added first so it's front-and-centre now the tournament's done)
const resultsTab = document.createElement('div');
resultsTab.className = 'tab results-tab';
resultsTab.id = 'tab-results';
resultsTab.textContent = '🏆 Results';
resultsTab.onclick = () => setActive('results');
summaryTabsEl.appendChild(resultsTab);

const resultsPanel = buildResultsPanel();
panelsEl.appendChild(resultsPanel);

// Summary tab
const summaryTab = document.createElement('div');
summaryTab.className = 'tab summary-tab';
summaryTab.id = 'tab-summary';
summaryTab.textContent = 'Summary';
summaryTab.onclick = () => setActive('summary');
summaryTabsEl.appendChild(summaryTab);

const summaryPanel = buildSummaryPanel();
panelsEl.appendChild(summaryPanel);
summaryPanel.appendChild(buildGoalsScale());

// Person tabs
people.forEach((person, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.id = `tab-${i}`;
  tab.textContent = tabLabel(person.name);
  tab.onclick = () => setActive(i);
  peopleTabsEl.appendChild(tab);
  panelsEl.appendChild(buildPersonPanel(person, i));
});

// Open on Results now that the tournament has finished
setActive('results');
</script>
